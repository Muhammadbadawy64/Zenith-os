<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <!-- Background -->
  <rect width="256" height="256" rx="56" fill="url(#bg-gradient)" />
  
  <!-- Outer Glow Ring -->
  <circle cx="128" cy="128" r="80" fill="none" stroke="url(#ring-gradient)" stroke-width="8" stroke-linecap="round" stroke-dasharray="140 20 40 20" />
  
  <!-- Elegant Z -->
  <path d="M90 90 L166 90 L90 166 L166 166" fill="none" stroke="url(#z-gradient)" stroke-width="24" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
  
  <defs>
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#140033" />
      <stop offset="100%" stop-color="#0a001a" />
    </linearGradient>
    <linearGradient id="ring-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#b266ff" />
      <stop offset="100%" stop-color="#6600cc" />
    </linearGradient>
    <linearGradient id="z-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="50%" stop-color="#e6ccff" />
      <stop offset="100%" stop-color="#9933ff" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
</svg>
